<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tienda Virtual - Clientes</title>
    <style>
        input.error { border: 2px solid red; }
        .msg-error { color: red; font-size: 0.85em; }
    </style>
    <script>
        const URL_CLIENTES = "https://ms-clientes-production.up.railway.app";

        /* ── Helpers de validación ── */
        function limpiarErrores() {
            document.querySelectorAll("input.error").forEach(el => el.classList.remove("error"));
            document.querySelectorAll(".msg-error").forEach(el => el.textContent = "");
        }

        function marcarError(id, mensaje) {
            const input = document.getElementById(id);
            input.classList.add("error");
            const span = document.getElementById("err-" + id);
            if (span) span.textContent = mensaje;
        }

        function soloNumeros(e) {
            // Permite: dígitos, Backspace, Delete, Tab, flechas
            if (!/^\d$/.test(e.key) && !["Backspace","Delete","Tab","ArrowLeft","ArrowRight"].includes(e.key)) {
                e.preventDefault();
            }
        }

        function validarEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function validarFormulario() {
            limpiarErrores();
            let valido = true;

            const campos = [
                { id: "cedula",        label: "Cédula" },
                { id: "nombreCliente", label: "Nombre" },
                { id: "direccion",     label: "Dirección" },
                { id: "telefono",      label: "Teléfono" },
                { id: "emailCliente",  label: "Correo electrónico" }
            ];

            campos.forEach(({ id, label }) => {
                const val = document.getElementById(id).value.trim();
                if (!val) {
                    marcarError(id, label + " es obligatorio.");
                    valido = false;
                }
            });

            // Validación extra: cédula solo números
            const cedula = document.getElementById("cedula").value.trim();
            if (cedula && !/^\d+$/.test(cedula)) {
                marcarError("cedula", "La cédula debe contener solo números.");
                valido = false;
            }

            // Validación extra: teléfono solo números
            const telefono = document.getElementById("telefono").value.trim();
            if (telefono && !/^\d+$/.test(telefono)) {
                marcarError("telefono", "El teléfono debe contener solo números.");
                valido = false;
            }

            // Validación extra: formato email
            const email = document.getElementById("emailCliente").value.trim();
            if (email && !validarEmail(email)) {
                marcarError("emailCliente", "Ingrese un correo electrónico válido.");
                valido = false;
            }

            return valido;
        }

        function limpiarFormulario() {
            ["cedula","nombreCliente","direccion","telefono","emailCliente"].forEach(id => {
                document.getElementById(id).value = "";
            });
            limpiarErrores();
        }

        /* ── API calls ── */
        async function listar() {
            try {
                const response = await fetch(URL_CLIENTES + "/clientes/listar");
                if (!response.ok) throw new Error("Error HTTP: " + response.status);
                const data = await response.json();
                const tabla = document.getElementById("tablaClientes");
                tabla.innerHTML = "";
                if (!Array.isArray(data)) return;
                for (let i = 0; i < data.length; i++) {
                    const c = data[i];
                    tabla.innerHTML +=
                        "<tr>" +
                        "<td>" + (c.cedulaCliente ?? "") + "</td>" +
                        "<td>" + (c.nombreCliente ?? "") + "</td>" +
                        "<td>" + (c.direccionCliente ?? "") + "</td>" +
                        "<td>" + (c.telefonoCliente ?? "") + "</td>" +
                        "<td>" + (c.emailCliente ?? "") + "</td>" +
                        "</tr>";
                }
            } catch (error) {
                console.error("Error al listar:", error);
            }
        }

        async function guardar() {
            if (!validarFormulario()) return;

            const cliente = {
                cedulaCliente:    document.getElementById("cedula").value.trim(),
                nombreCliente:    document.getElementById("nombreCliente").value.trim(),
                direccionCliente: document.getElementById("direccion").value.trim(),
                telefonoCliente:  document.getElementById("telefono").value.trim(),
                emailCliente:     document.getElementById("emailCliente").value.trim()
            };
            try {
                const response = await fetch(URL_CLIENTES + "/clientes/guardar", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(cliente)
                });
                if (!response.ok) throw new Error("Error al guardar: " + response.status);
                alert("Cliente guardado correctamente");
                limpiarFormulario();
                listar();
            } catch (error) {
                console.error("Error al guardar:", error);
                alert("Error al guardar cliente");
            }
        }

        async function eliminar() {
            const id = document.getElementById("idEliminar").value.trim();
            if (!id) { alert("Ingrese el ID"); return; }
            if (!confirm("¿Está seguro de que desea eliminar este cliente?")) return;
            try {
                const response = await fetch(URL_CLIENTES + "/clientes/eliminar/" + id, {
                    method: "DELETE"
                });
                if (!response.ok) throw new Error("Error al eliminar");
                alert("Cliente eliminado correctamente");
                document.getElementById("idEliminar").value = "";
                listar();
            } catch (error) {
                console.error("Error al eliminar:", error);
                alert("Error al eliminar cliente");
            }
        }

        window.onload = listar;
    </script>
</head>
<body>
    <h2>Tienda Virtual</h2>
    <nav>
        <a href="index.html">Inicio</a> |
        <a href="usuarios.html">Usuarios</a> |
        <a href="clientes.html">Clientes</a> |
        <a href="proveedores.html">Proveedores</a> |
        <a href="productos.html">Productos</a> |
        <a href="ventas.html">Ventas</a> |
        <a href="reportes.html">Reportes</a>
    </nav>
    <hr/>
    <h3>Gestión de Clientes</h3>
    <table border="1">
        <tr>
            <td>Cédula:</td>
            <td>
                <input type="text" id="cedula" onkeydown="soloNumeros(event)"/>
                <span class="msg-error" id="err-cedula"></span>
            </td>
            <td>Teléfono:</td>
            <td>
                <input type="text" id="telefono" onkeydown="soloNumeros(event)"/>
                <span class="msg-error" id="err-telefono"></span>
            </td>
        </tr>
        <tr>
            <td>Nombre Completo:</td>
            <td>
                <input type="text" id="nombreCliente"/>
                <span class="msg-error" id="err-nombreCliente"></span>
            </td>
            <td>Correo Electrónico:</td>
            <td>
                <input type="text" id="emailCliente"/>
                <span class="msg-error" id="err-emailCliente"></span>
            </td>
        </tr>
        <tr>
            <td>Dirección:</td>
            <td>
                <input type="text" id="direccion"/>
                <span class="msg-error" id="err-direccion"></span>
            </td>
        </tr>
        <tr>
            <td colspan="4">
                <input type="button" value="Guardar" onclick="guardar()"/>
                <input type="button" value="Limpiar" onclick="limpiarFormulario()"/>
            </td>
        </tr>
    </table>
    <hr/>
    <h3>Eliminar Cliente</h3>
    <table>
        <tr>
            <td>ID MongoDB:</td>
            <td><input type="text" id="idEliminar"/></td>
            <td><input type="button" value="Eliminar" onclick="eliminar()"/></td>
        </tr>
    </table>
    <hr/>
    <h3>Listado de Clientes</h3>
    <table border="1">
        <thead>
            <tr>
                <th>Cédula</th>
                <th>Nombre</th>
                <th>Dirección</th>
                <th>Teléfono</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody id="tablaClientes"></tbody>
    </table>
</body>
</html>
